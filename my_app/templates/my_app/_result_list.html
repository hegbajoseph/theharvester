<div class="result-panel">
  <div class="result-header">
    <span class="result-title">{{ icon }} {{ title }}</span>
    <span class="result-count">{{ items|length }} résultat(s)</span>
  </div>
  <div class="result-search">
    <input type="text" class="search-input"
           placeholder="Filtrer..."
           oninput="filterList(this, 'list-{{ title|lower }}')">
  </div>
  <div class="result-list" id="list-{{ title|lower }}">
    {% for item in items %}
      <div class="result-item">
        <span class="item-value">{{ item }}</span>
        <button class="item-copy" onclick="copyItem('{{ item }}')">⎘</button>
      </div>
    {% empty %}
      <div class="empty-state">Aucun résultat trouvé</div>
    {% endfor %}
  </div>
</div>
